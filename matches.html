<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matches | MatchIQ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="matches">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">IQ</span>MatchIQ</a>
      <nav class="site-nav">
        <a href="index.html" data-nav="home">Home</a>
        <a href="matches.html" data-nav="matches">Matches</a>
        <a href="leagues.html" data-nav="leagues">Leagues</a>
        <a href="teams.html" data-nav="teams">Teams</a>
        <a href="players.html" data-nav="players">Players</a>
      </nav>
      <button class="mobile-toggle" id="mobile-toggle" aria-label="Open navigation">Menu</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="page-hero">
      <span class="eyebrow">Match centre</span>
      <h1>Fixtures, live states, <span>and context.</span></h1>
      <p>Filter by league and match status. Each card opens a richer match-detail screen with stats, timeline, lineups, and MatchIQ analysis.</p>
      <div class="filter-row">
        <select id="league-filter" aria-label="Filter by league"></select>
        <select id="status-filter" aria-label="Filter by status">
          <option value="all">All statuses</option>
          <option value="LIVE">Live</option>
          <option value="SCHEDULED">Upcoming</option>
          <option value="FT">Full time</option>
        </select>
      </div>
    </section>

    <section class="section">
      <div id="matches-list" class="matches-list"></div>
    </section>
  </main>

  <footer class="footer">
    <strong>MatchIQ</strong>
    <span>Match cards use mock data for MVP testing.</span>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
