<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Detail | MatchIQ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="match">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">IQ</span>MatchIQ</a>
      <nav class="site-nav">
        <a href="index.html" data-nav="home">Home</a>
        <a href="matches.html" data-nav="matches">Matches</a>
        <a href="leagues.html" data-nav="leagues">Leagues</a>
        <a href="teams.html" data-nav="teams">Teams</a>
        <a href="players.html" data-nav="players">Players</a>
      </nav>
      <button class="mobile-toggle" id="mobile-toggle" aria-label="Open navigation">Menu</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="page-hero" id="match-hero"></section>

    <section class="section grid-2">
      <div class="panel panel-pad">
        <div class="section-title"><div><span>Numbers</span><h2>Match stats</h2></div></div>
        <div id="match-stats"></div>
      </div>
      <div class="panel panel-pad">
        <div class="section-title"><div><span>Events</span><h2>Timeline</h2></div></div>
        <div id="timeline"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <div><span>Tactics</span><h2>Lineups and formations</h2></div>
        <p>This is static in v1, but designed to become formation maps and player-position boards later.</p>
      </div>
      <div id="lineups" class="lineup-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <strong>MatchIQ</strong>
    <span>Match detail prototype · Mock data</span>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
